    <style>
        :root {
            --accent: #2563eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                "Microsoft YaHei", sans-serif;
            color: #111;
            line-height: 1.6;
        }

        .link {
            color: #0066cc;
            text-decoration: none;
        }

        .dl-link {
            color: #3980c7;
            text-decoration: underline;
        }

        /* 顶栏 */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }

        .nav {
            max-width: 1100px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .nav-left img {
            width: 32px;
        }

        .nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
        }

        .nav a:hover {
            color: var(--accent);
        }

        /* 通用 section */
        section {
            padding: 80px 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 30px;
            margin-bottom: 15px;
        }

        p {
            color: #444;
            margin-bottom: 10px;
        }

        ul {
            margin-top: 10px;
        }

        /* Hero */
        .hero {
            text-align: center;
            background: #000;
            color: #fff;
        }

        .hero p {
            color: #ccc;
        }

        .hero img {
            width: 120px;
            margin-bottom: 20px;
        }

        /* 深浅分区 */
        .light {
            background: #f5f5f5;
        }

        .dark {
            background: #111;
            color: #fff;
        }

        .dark p {
            color: #bbb;
        }

        /* 内容布局 */
        .feature {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
        }

        .feature img {
            width: 100px;
        }

        .feature svg {
            width: 100px;
            fill: currentColor; 
        }

        .feature-text {
            flex: 1;
            min-width: 250px;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 26px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }

        .btn:hover {
            background: #1e4fd1;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: #000;
            color: #aaa;
        }

        footer a {
            color: #ccc;
            margin: 0 10px;
        }

        /* 移动端 */
        @media (max-width: 600px) {
            h1 {
                font-size: 30px;
            }

            h2 {
                font-size: 24px;
            }

            .feature {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
