<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="帮助中心 - 一款高便携浏览器，在老师 / 老板的监视下隐形。">
    <meta name="keywords" content="Hidden Browser,希沃管家,360,学校,电教委,隐形浏览器,便携浏览器,窗口捕获隐藏,隐私安全,站点锁,跨设备迁移">
    <title>帮助中心 - Hidden Browser</title>

    <style>
        :root {
            --accent: #2563eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                "Microsoft YaHei", sans-serif;
            color: #111;
            line-height: 1.6;
        }

        /* 顶栏 */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }

        .nav {
            max-width: 1100px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .nav-left img {
            width: 32px;
        }

        .nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
        }

        .nav a:hover {
            color: var(--accent);
        }

        /* 通用 section */
        section {
            padding: 80px 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 30px;
            margin-bottom: 15px;
        }

        p {
            color: #444;
            margin-bottom: 10px;
        }

        ul {
            margin-top: 10px;
        }

        /* Hero */
        .hero {
            text-align: center;
            background: #000;
            color: #fff;
        }

        .hero p {
            color: #ccc;
        }

        .hero img {
            width: 120px;
            margin-bottom: 20px;
        }

        /* 深浅分区 */
        .light {
            background: #f5f5f5;
        }

        .dark {
            background: #111;
            color: #fff;
        }

        .dark p {
            color: #bbb;
        }

        /* 内容布局 */
        .feature {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
        }

        .feature img {
            width: 100px;
        }

        .feature-text {
            flex: 1;
            min-width: 250px;
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 26px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }

        .btn:hover {
            background: #1e4fd1;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: #000;
            color: #aaa;
        }

        footer a {
            color: #ccc;
            margin: 0 10px;
        }

        /* 移动端 */
        @media (max-width: 600px) {
            h1 {
                font-size: 30px;
            }

            h2 {
                font-size: 24px;
            }

            .feature {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- 顶栏 -->
    <header>
        <div class="nav">
            <div class="nav-left">
                <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
                    <img src="/res/logo.webp">
                    <span>Hidden Browser</span>
                </a>
            </div>
            <div>
                <a href="/support">帮助中心</a>
                <a href="/support/download">下载</a>
                <a href="/donate">赞助版</a>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <img src="https://hiddenbrowser.github.io/res/logo.webp">
            <h1>帮助中心 - Hidden Browser</h1>
            <p>一款高便携浏览器，在老师 / 老板的监视下隐形。</p>
            <p>A high-portability browser, invisible under surveillance.</p>
        </div>
    </section>

    <!-- 下载中心 -->
    <section class="light">
        <div class="container feature">
            <div class="feature-text">
                <h2>下载中心</h2>
                <p>在这可以找到软件的历史版本并下载。</p>
            </div>
            <a href="/support/download" class="btn">前往下载</a>
        </div>
    </section>

    <!-- 使用教程 -->
    <section class="dark">
        <div class="container feature">
            <div class="feature-text">
                <h2>使用教程</h2>
                <p>下载完成后，便可以查看使用文档。</p>
                <p>内含详细的使用说明和常见问题解答。</p>
            </div>
            <a href="/support/dochub" class="btn">文档中心</a>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>
            <a href="/copyright">版权声明</a> |
            <a href="/open-source-license">开源许可证</a> |
            <a href="/support/about">联系开发者</a>
        </p>
        <p>Copyright © 2026 yl_lty</p>
        <p>Hosted on GitHub Pages</p>
    </footer>

</body>

</html>
