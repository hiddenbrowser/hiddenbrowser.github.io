<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开始使用 - Hidden Browser</title>
    <style>
        :root {
            --accent: #2563eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                "Microsoft YaHei", sans-serif;
            color: #111;
            line-height: 1.6;
        }

        /* 顶栏 */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }

        .nav {
            max-width: 1100px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .nav-left img {
            width: 32px;
        }

        .nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
        }

        .nav a:hover {
            color: var(--accent);
        }

        h1 {
            font-size: 42px;
            margin-left: 100px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 30px;
            margin-bottom: 15px;
        }

        p {
            color: #444;
            margin-left: 100px;
        }

        ul {
            margin-left: 120px;
        }
    </style>
</head>

<body>
    <!-- 顶栏 -->
    <header>
        <div class="nav">
            <div class="nav-left">
                <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
                    <img src="/res/logo.webp">
                    <span>Hidden Browser</span>
                </a>
            </div>
            <div>
                <a href="/support">帮助中心</a>
                <a href="/support/download">下载</a>
                <a href="/donate">赞助版</a>
            </div>
        </div>
    </header>
    <h1>使用教程</h1>
    <p>下载完成后，便可以查看使用文档。</p>
    <p>如果你是第一次使用Hidden Browser，建议按照以下步骤进行：</p>
    <ul>
        <li>步骤一：启动Hidden Browser</li>
        <li>步骤二：配置浏览器设置</li>
        <li>步骤三：开始使用</li>
    </ul>
</body>

</html>
